[tasks.build]
cmd = "cargo build --workspace"

[tasks.test]
cmd = "cargo test --workspace"

[tasks.lint]
cmd = "cargo clippy --workspace -- -D warnings"

[tasks.fmt]
cmd = "cargo fmt --check"

[tasks.audit]
cmd = "cargo audit"

[tasks.check-types]
cmd = "cargo check --workspace"

[flows.check]
description = "Quick pre-commit check"
steps = [{ parallel = ["fmt", "lint"] }, "test"]

[flows.ci]
description = "Full CI pipeline"
steps = ["fmt", "lint", "test", "build"]

[flows.pre-commit]
description = "Fast gate before committing"
steps = [{ parallel = ["fmt", "lint"] }, "check-types"]

[lanes.verify]
description = "Native verification used by the unified Trust gate"
steps = ["fmt", "lint", "test", "build"]
