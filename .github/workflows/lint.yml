name: Lint

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'plugins/**'
      - 'src/**'
      - 'tests/**'
      - 'Cargo.toml'
      - 'rust-toolchain.toml'
      - '.github/workflows/lint.yml'
  pull_request:
    branches: [main]
    paths:
      - 'crates/**'
      - 'plugins/**'
      - 'src/**'
      - 'tests/**'
      - 'Cargo.toml'
      - 'rust-toolchain.toml'
      - '.github/workflows/lint.yml'

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format check
        run: cargo fmt --all -- --check
