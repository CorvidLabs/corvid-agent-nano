name: Spec Sync

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  spec-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Spec validation
        uses: CorvidLabs/spec-sync@v2.4.0
        with:
          strict: 'false'
          remote: 'true'
