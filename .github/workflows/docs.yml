name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**'          # atlas spec-coverage badge tracks the source
      - 'crates/**'       # and the runtime crates
      - 'specs/**'        # and the specs that govern them
      - '.atlasignore'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# Run the bundled Node-20 JavaScript actions on Node 24 to silence GitHub's
# Node-20 end-of-life deprecation warnings.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # atlas reads git history for activity

      - name: Install mdBook
        run: |
          mkdir -p $HOME/.local/bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz | tar xz -C $HOME/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build docs
        run: mdbook build docs

      # Render corvid-agent-nano's spec-coverage badge + SVG cards from the atlas
      # into the built mdBook site, so they ship to Pages alongside the docs
      # (served at corvidlabs.github.io/corvid-agent-nano/badges/). Cached by the
      # pinned v1 commit so the step is a fast no-op on a cache hit.
      - name: Resolve pinned atlas commit (cache key)
        id: atlasref
        run: echo "sha=$(git ls-remote https://github.com/CorvidLabs/fledge-plugin-atlas v1 | cut -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache the fledge-atlas CLI
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/fledge-atlas
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: fledge-atlas-${{ runner.os }}-${{ steps.atlasref.outputs.sha }}

      - name: Render atlas coverage badges
        uses: CorvidLabs/fledge-plugin-atlas@v1
        with:
          path: .
          output-dir: docs/book/badges
          components: "coverage langmix treemap sunburst"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
