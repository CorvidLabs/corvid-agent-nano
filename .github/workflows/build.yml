name: Build

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'plugins/**'
      - 'src/**'
      - 'tests/**'
      - 'Cargo.toml'
      - 'rust-toolchain.toml'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'crates/**'
      - 'plugins/**'
      - 'src/**'
      - 'tests/**'
      - 'Cargo.toml'
      - 'rust-toolchain.toml'
      - '.github/workflows/build.yml'

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --workspace

      - name: Build (release)
        run: cargo build --workspace --release
