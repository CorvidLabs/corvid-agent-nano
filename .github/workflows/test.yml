name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Fix rustup settings
        run: |
          if [ -f "$HOME/.rustup/settings.toml" ]; then
            if ! grep -q 'version' "$HOME/.rustup/settings.toml" 2>/dev/null; then
              rm -f "$HOME/.rustup/settings.toml"
            fi
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --workspace

      - name: Run tests (release)
        run: cargo test --workspace --release
